<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<link rel="manifest" href="manifest.json"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="default"/>
<meta name="apple-mobile-web-app-title" content="IRA Mobiles"/>
<meta name="theme-color" content="#009950"/>
<title>Guard Hub · IRA Mobiles</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
:root,[data-theme="light"]{
  --bg:#F5F4F0;--s1:#FFFFFF;--s2:#F0EEE9;--s3:#E8E6E0;
  --border:#E2E0DA;--border2:#CCCAC4;
  --text:#111111;--text2:#555550;--text3:#99998A;
  --green:#009950;--greenD:#007A3E;
  --blue:#0066CC;--sky:#0088CC;
  --amber:#B07000;--red:#CC2200;--teal:#007A5E;
  --font:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
  --input-bg:#FFFFFF;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
}
[data-theme="dark"]{
  --bg:#000000;--s1:#0A0A0A;--s2:#111111;--s3:#1A1A1A;
  --border:#222222;--border2:#333333;
  --text:#FFFFFF;--text2:#AAAAAA;--text3:#555555;
  --green:#00FF87;--greenD:#00D870;
  --blue:#00AAFF;--sky:#00CCFF;
  --amber:#FFB000;--red:#FF2244;--teal:#00FFCC;
  --font:'Space Grotesk',sans-serif;
  --mono:'Space Mono',monospace;
  --input-bg:#0E0E0E;
  --shadow:none;
}
html,body{transition:background .2s,color .2s;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);-webkit-font-smoothing:antialiased;height:100%;}
::-webkit-scrollbar{width:0;height:0;}
button{cursor:pointer;font-family:var(--font);}
input{font-family:var(--font);}

/* ── LAYOUT ── */
#app{min-height:100vh;display:flex;flex-direction:column;padding-bottom:80px;}

/* ── HEADER ── */
.header{background:var(--s1);border-bottom:1px solid var(--border);padding:14px 16px;position:sticky;top:0;z-index:50;}
.header-row{display:flex;align-items:center;justify-content:space-between;}
.back-btn{display:flex;align-items:center;gap:6px;background:var(--s3);border:1px solid var(--border);color:var(--text2);border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;text-decoration:none;}
.back-btn:active{transform:scale(.97);}
.header-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.header-sub{font-size:10px;color:var(--text3);margin-top:1px;font-family:var(--mono);}
.sync-btn{display:flex;align-items:center;gap:5px;background:var(--green);border:none;color:#000;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:800;letter-spacing:.3px;}
.sync-btn:active{transform:scale(.97);}
.sync-btn.loading{background:var(--s3);color:var(--text3);border:1px solid var(--border);}

/* ── SEARCH ── */
.search-section{padding:10px 14px 6px;background:var(--bg);}
.search-inner{position:relative;display:flex;align-items:center;}
.search-icon{position:absolute;left:13px;font-size:14px;color:var(--text3);pointer-events:none;}
.search-input{
  width:100%;padding:11px 40px 11px 38px;
  border-radius:10px;background:var(--input-bg);border:1px solid var(--border2);
  color:var(--text);font-size:15px;font-weight:600;outline:none;
  transition:border-color .15s;
}
.search-input:focus{border-color:var(--text3);}
.search-clear{position:absolute;right:12px;background:none;border:none;color:var(--text3);font-size:18px;line-height:1;padding:4px;display:none;}

/* ── BRAND CHIPS ── */
.chips-wrap{padding:8px 14px 4px;overflow-x:auto;display:flex;gap:7px;scrollbar-width:none;}
.brand-chip{
  flex-shrink:0;padding:6px 14px;border-radius:20px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text3);font-size:11px;font-weight:700;letter-spacing:.3px;
  transition:all .15s;
}
.brand-chip.on{background:var(--text);color:var(--bg);border-color:var(--text);}

/* ── TABS ── */
.tabs-wrap{display:flex;border-bottom:1px solid var(--border);background:var(--s1);overflow-x:auto;padding:0 10px;scrollbar-width:none;}
.tab-btn{
  white-space:nowrap;padding:10px 13px;font-size:11px;font-weight:700;
  background:transparent;border:none;border-bottom:2px solid transparent;
  color:var(--text3);transition:color .12s,border-color .12s;display:flex;align-items:center;gap:5px;
}
.tab-btn.on{color:var(--text);border-bottom-color:var(--green);}
.tab-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;background:var(--s3);color:var(--text3);}
.tab-btn.on .tab-badge{background:var(--green);color:#000;}

/* ── RESULT CARDS ── */
.results-wrap{padding:10px 14px;flex:1;}
.res-card{
  display:flex;background:var(--s1);border-radius:12px;
  border:1px solid var(--border);margin-bottom:8px;overflow:hidden;
  transition:border-color .15s;
}
.res-card:active{border-color:var(--border2);}
.res-left{
  flex-shrink:0;width:80px;background:var(--s2);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  border-right:1px solid var(--border);padding:12px 4px;gap:4px;
}
.res-guard{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);line-height:1;}
.res-group{font-size:10px;font-weight:700;color:var(--green);background:#00FF8714;padding:2px 7px;border-radius:10px;letter-spacing:.3px;}
.res-right{flex:1;padding:12px 14px;min-width:0;}
.res-brand{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1px;margin-bottom:3px;}
.res-model{font-size:14px;font-weight:700;color:var(--text);line-height:1.3;}

/* ── REPO GRID ── */
.repo-wrap{padding:10px 14px;}
.pill-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px;}
.data-pill{
  padding:5px 10px;background:var(--s2);border:1px solid var(--border2);
  border-radius:7px;font-size:11px;font-weight:700;color:var(--text3);cursor:pointer;
  transition:all .12s;
}
.data-pill.on{background:var(--green);color:#000;border-color:var(--green);}
.nano-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;}
.nano-card{background:var(--s1);border:1px solid var(--border);border-radius:9px;padding:9px 8px;}
.nano-brand{font-size:9px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:.5px;margin-bottom:3px;}
.nano-model{font-size:11px;font-weight:700;color:var(--text);line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}

/* ── STATS ── */
.stats-section{padding:10px 14px 4px;}
.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;}
.stat-box{background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;}
.stat-val{font-family:var(--mono);font-size:18px;font-weight:700;color:var(--text);display:block;}
.stat-lbl{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;margin-top:3px;display:block;}

/* ── EMPTY / LOADING ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-icon{font-size:36px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.empty-sub{font-size:13px;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--s2);border:1px solid var(--border2);border-radius:10px;
  padding:10px 18px;font-size:13px;font-weight:700;z-index:1000;
  white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;
}
.toast.show{opacity:1;}

/* ── BOTTOM NAV ── */
.bottom-nav{
  position:fixed;bottom:12px;left:14px;right:14px;
  background:rgba(8,8,8,.97);backdrop-filter:blur(12px);
  border:1px solid var(--border);border-radius:18px;
  display:flex;height:60px;z-index:100;
  max-width:calc(480px - 28px);margin:0 auto;
}
@media(min-width:508px){.bottom-nav{left:50%;transform:translateX(-50%);right:auto;width:452px;}}
.nav-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:3px;background:none;border:none;
  color:var(--text3);font-size:9px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;
  transition:color .12s;
}
.nav-btn.on{color:var(--green);}
.nav-btn svg{width:18px;height:18px;}

/* responsive max-width */
@media(min-width:520px){
  .header,.search-section,.chips-wrap,.tabs-wrap,.results-wrap,.repo-wrap,.stats-section{max-width:520px;margin-left:auto;margin-right:auto;}
}
</style>
</head>
<body>
<div id="app">

  <div class="header">
    <div class="header-row">
      <a href="index.html" class="back-btn">← Home</a>
      <div style="text-align:center;">
        <div class="header-title">🛡️ Guard Hub</div>
        <div class="header-sub" id="hdr-sub">Loading…</div>
      </div>
      <button class="icon-btn" id="theme-btn-gh" onclick="toggleThemeGH()" style="font-size:15px;" title="Toggle theme">☀️</button>
      <button class="sync-btn" id="sync-btn" onclick="doSync()">↻ Sync</button>
    </div>
  </div>

  <div id="view-search" style="display:flex;flex-direction:column;flex:1;">
    <div class="search-section">
      <div class="search-inner">
        <span class="search-icon">🔍</span>
        <input class="search-input" id="q" placeholder="Search model, brand, guard ID…" oninput="onInput()" autocomplete="off"/>
        <button class="search-clear" id="clr" onclick="clearSearch()">×</button>
      </div>
    </div>
    <div class="chips-wrap" id="chips"></div>
    <div class="tabs-wrap" id="search-tabs" style="display:none;">
      <button class="tab-btn on" id="tab-all" onclick="setSearchTab('all')">All <span class="tab-badge" id="tab-all-ct">0</span></button>
      <button class="tab-btn" id="tab-guard" onclick="setSearchTab('guard')">By Guard ID</button>
      <button class="tab-btn" id="tab-group" onclick="setSearchTab('group')">By Group</button>
    </div>
    <div class="results-wrap" id="results">
      <div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">Start searching</div><div class="empty-sub">Type a model name, brand or guard ID</div></div>
    </div>
  </div>

  <div id="view-repo" style="display:none;flex-direction:column;flex:1;">
    <div class="tabs-wrap">
      <button class="tab-btn on" id="repo-tab-id" onclick="setRepoTab('guard')">Guard IDs</button>
      <button class="tab-btn" id="repo-tab-grp" onclick="setRepoTab('common')">Groups</button>
    </div>
    <div class="repo-wrap">
      <div class="pill-grid" id="repo-pills"></div>
      <div class="nano-grid" id="repo-results"></div>
    </div>
  </div>

  <div id="view-stats" style="display:none;flex-direction:column;flex:1;">
    <div class="stats-section">
      <div class="stats-grid">
        <div class="stat-box"><span class="stat-val" id="st-models">0</span><span class="stat-lbl">Models</span></div>
        <div class="stat-box"><span class="stat-val" id="st-brands">0</span><span class="stat-lbl">Brands</span></div>
        <div class="stat-box"><span class="stat-val" id="st-ids">0</span><span class="stat-lbl">Guard IDs</span></div>
      </div>
    </div>
    <div style="padding:14px;">
      <button onclick="doSync()" style="width:100%;padding:13px;background:var(--green);color:#000;border:none;border-radius:10px;font-size:14px;font-weight:800;letter-spacing:.5px;">↻ Sync Database from Sheet</button>
      <div style="margin-top:10px;background:var(--s2);border:1px solid var(--border);border-radius:10px;padding:12px 14px;font-size:12px;color:var(--text3);line-height:1.7;">
        <div style="font-weight:700;color:var(--text2);margin-bottom:4px;">Data source</div>
        Pulls from your Google Sheet. Tap Sync to refresh the local database. Data is stored on this device.
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<nav class="bottom-nav">
  <button class="nav-btn on" id="nav-search" onclick="showView('search')">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" stroke-linecap="round"/></svg>
    Search
  </button>
  <button class="nav-btn" id="nav-repo" onclick="showView('repo')">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" stroke-linecap="round" stroke-linejoin="round"/></svg>
    Library
  </button>
  <button class="nav-btn" id="nav-stats" onclick="showView('stats')">
    <svg fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" stroke-linecap="round"/></svg>
    Stats
  </button>
</nav>

<script>
const SHEET_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vSmkI9nPrcJ_MQVtXvCb4s7wztZD4TP7gD9kRA0UUAOwka3wgB6WSEvZCbSSNP-Vg/pub?output=csv';
let db = JSON.parse(localStorage.getItem('guardDB') || '[]');
let selectedBrand = null;
let searchTab = 'all';
let repoTab = 'guard';
let curView = 'search';

// ── TOAST ──────────────────────────────────────────────────
let _toastT;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(_toastT);
  _toastT = setTimeout(() => el.classList.remove('show'), 2200);
}

// ── SYNC ──────────────────────────────────────────────────
async function doSync() {
  const btn = document.getElementById('sync-btn');
  btn.textContent = '…'; btn.classList.add('loading'); btn.disabled = true;
  toast('Syncing database…');
  try {
    const res = await fetch(SHEET_URL + '&t=' + Date.now());
    const csv = await res.text();
    parseCSV(csv);
    toast('✓ Database updated');
  } catch(e) {
    toast('⚠ Sync failed — check connection');
  }
  btn.innerHTML = '↻ Sync'; btn.classList.remove('loading'); btn.disabled = false;
}

function parseCSV(csv) {
  const lines = csv.split(/\r?\n/);
  const newDb = [];
  for(let i = 1; i < lines.length; i++) {
    const cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
    if(cols.length >= 3) {
      const brand = cols[0].replace(/"/g,'').trim();
      const model = cols[1].replace(/"/g,'').trim();
      const guard = cols[2].replace(/"/g,'').trim();
      const common = cols[3] ? cols[3].replace(/"/g,'').trim() : '';
      if(brand && model && guard) newDb.push({brand, model, guard, common});
    }
  }
  db = newDb;
  localStorage.setItem('guardDB', JSON.stringify(db));
  updateAll();
}

// ── VIEWS ─────────────────────────────────────────────────
function showView(v) {
  curView = v;
  ['search','repo','stats'].forEach(n => {
    document.getElementById('view-'+n).style.display = n===v ? 'flex' : 'none';
    document.getElementById('nav-'+n).classList.toggle('on', n===v);
  });
  if(v==='repo') renderRepoPills();
  if(v==='stats') updateStats();
}

// ── HEADER SUB ────────────────────────────────────────────
function updateHeaderSub() {
  const el = document.getElementById('hdr-sub');
  if(!db.length) { el.textContent = 'No data — tap Sync'; return; }
  const brands = new Set(db.map(i=>i.brand)).size;
  el.textContent = `${db.length} models · ${brands} brands`;
}

// ── BRAND CHIPS ───────────────────────────────────────────
function renderChips() {
  const brands = [...new Set(db.map(i=>i.brand))].sort();
  document.getElementById('chips').innerHTML = brands.map(b =>
    `<button class="brand-chip${b===selectedBrand?' on':''}" onclick="toggleBrand('${b.replace(/'/g,"\\'")}')">${b}</button>`
  ).join('');
}

function toggleBrand(b) {
  selectedBrand = selectedBrand === b ? null : b;
  renderChips();
  search();
}

// ── SEARCH ────────────────────────────────────────────────
function onInput() {
  const q = document.getElementById('q').value;
  document.getElementById('clr').style.display = q ? 'block' : 'none';
  search();
}

function clearSearch() {
  document.getElementById('q').value = '';
  document.getElementById('clr').style.display = 'none';
  selectedBrand = null;
  renderChips();
  search();
}

function setSearchTab(t) {
  searchTab = t;
  ['all','guard','group'].forEach(k => {
    document.getElementById('tab-'+k).classList.toggle('on', k===t);
  });
  search();
}

function search() {
  const q = document.getElementById('q').value.toLowerCase().trim();
  const res = document.getElementById('results');
  const tabsEl = document.getElementById('search-tabs');

  if(!q && !selectedBrand) {
    tabsEl.style.display = 'none';
    res.innerHTML = `<div class="empty"><div class="empty-icon">🛡️</div><div class="empty-title">${db.length ? db.length+' models ready' : 'No data yet'}</div><div class="empty-sub">${db.length ? 'Type a model name, brand or guard ID' : 'Tap ↻ Sync to load the database'}</div></div>`;
    return;
  }

  const terms = q.split(/\s+/).filter(Boolean);
  let filtered = db.filter(item => {
    const text = `${item.brand} ${item.model} ${item.guard} ${item.common}`.toLowerCase();
    return terms.every(t => text.includes(t)) && (!selectedBrand || item.brand === selectedBrand);
  });

  // Apply sub-tab filter
  if(searchTab === 'guard') filtered = [...new Map(filtered.map(i=>[i.guard, i])).values()];
  if(searchTab === 'group') filtered = [...new Map(filtered.map(i=>[i.common||i.guard, i])).values()];

  tabsEl.style.display = 'flex';
  document.getElementById('tab-all-ct').textContent = filtered.length;

  if(!filtered.length) {
    res.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-title">No results</div><div class="empty-sub">Try a different search term or brand</div></div>`;
    return;
  }

  res.innerHTML = filtered.map(m => `
    <div class="res-card">
      <div class="res-left">
        <div class="res-guard">${esc(m.guard)}</div>
        ${m.common ? `<div class="res-group">${esc(m.common)}</div>` : ''}
      </div>
      <div class="res-right">
        <div class="res-brand">${esc(m.brand)}</div>
        <div class="res-model">${esc(m.model)}</div>
      </div>
    </div>`).join('');
}

// ── REPO ──────────────────────────────────────────────────
function setRepoTab(t) {
  repoTab = t;
  document.getElementById('repo-tab-id').classList.toggle('on', t==='guard');
  document.getElementById('repo-tab-grp').classList.toggle('on', t==='common');
  document.getElementById('repo-results').innerHTML = '';
  document.querySelectorAll('.data-pill').forEach(p => p.classList.remove('on'));
  renderRepoPills();
}

function renderRepoPills() {
  const vals = [...new Set(db.map(i=>i[repoTab]).filter(Boolean))].sort((a,b)=>a.localeCompare(b,undefined,{numeric:true}));
  document.getElementById('repo-pills').innerHTML = vals.map(v =>
    `<button class="data-pill" onclick="viewRepo('${esc(v)}',this)">${esc(v)}</button>`
  ).join('');
}

function viewRepo(val, el) {
  document.querySelectorAll('.data-pill').forEach(p => p.classList.remove('on'));
  el.classList.add('on');
  const items = db.filter(i => i[repoTab] === val);
  document.getElementById('repo-results').innerHTML = items.map(m => `
    <div class="nano-card">
      <div class="nano-brand">${esc(m.brand)}</div>
      <div class="nano-model">${esc(m.model)}</div>
    </div>`).join('');
}

// ── STATS ─────────────────────────────────────────────────
function updateStats() {
  document.getElementById('st-models').textContent = db.length;
  document.getElementById('st-brands').textContent = new Set(db.map(i=>i.brand)).size;
  document.getElementById('st-ids').textContent = new Set(db.map(i=>i.guard)).size;
}

// ── UTILS ─────────────────────────────────────────────────
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function updateAll() {
  updateHeaderSub();
  renderChips();
  if(curView==='stats') updateStats();
  if(curView==='repo') renderRepoPills();
  search();
}

// ── THEME (reads shared ira_theme key set from index.html) ─
(function(){
  var t=localStorage.getItem('ira_theme')||'light';
  document.documentElement.setAttribute('data-theme',t);
  var b=document.getElementById('theme-btn-gh');
  if(b) b.textContent=t==='dark'?'🌙':'☀️';
})();
function toggleThemeGH(){
  var cur=document.documentElement.getAttribute('data-theme')||'light';
  var next=cur==='light'?'dark':'light';
  document.documentElement.setAttribute('data-theme',next);
  localStorage.setItem('ira_theme',next);
  var b=document.getElementById('theme-btn-gh');
  if(b) b.textContent=next==='dark'?'🌙':'☀️';
}

// ── BOOT ──────────────────────────────────────────────────
updateAll();
// Auto-sync if db is empty
if(!db.length) setTimeout(doSync, 800);
</script>
