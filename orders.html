<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Order Tracker · IRA Mobiles</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
/* ── THEME ── */
:root,[data-theme="light"]{
  --bg:#F5F4F0;--s1:#FFFFFF;--s2:#F0EEE9;--s3:#E8E6E0;
  --border:#E2E0DA;--border2:#CCCAC4;
  --text:#111111;--text2:#555550;--text3:#99998A;
  --green:#009950;--greenBg:#E6F5EE;--greenText:#007A3E;
  --blue:#0066CC;--blueBg:#E6F0FF;--blueText:#0052A3;
  --amber:#B07000;--amberBg:#FFF3DC;--amberText:#8A5600;
  --red:#CC2200;--redBg:#FFECE8;--redText:#A31A00;
  --purple:#7700CC;--purpleBg:#F2E8FF;--purpleText:#5C00A3;
  --sky:#0088CC;--skyBg:#E0F2FF;--skyText:#006699;
  --shadow:0 1px 3px rgba(0,0,0,.07),0 4px 14px rgba(0,0,0,.05);
  --input-bg:#FFFFFF;
}
[data-theme="dark"]{
  --bg:#000000;--s1:#0A0A0A;--s2:#111111;--s3:#1A1A1A;
  --border:#222222;--border2:#333333;
  --text:#FFFFFF;--text2:#AAAAAA;--text3:#555555;
  --green:#00FF87;--greenBg:#00FF8712;--greenText:#00FF87;
  --blue:#00AAFF;--blueBg:#00AAFF12;--blueText:#00AAFF;
  --amber:#FFB000;--amberBg:#FFB00012;--amberText:#FFB000;
  --red:#FF3322;--redBg:#FF332212;--redText:#FF3322;
  --purple:#CC44FF;--purpleBg:#CC44FF12;--purpleText:#CC44FF;
  --sky:#00CCFF;--skyBg:#00CCFF12;--skyText:#00CCFF;
  --shadow:none;
  --input-bg:#0E0E0E;
}
/* ── RESET ── */
*{box-sizing:border-box;margin:0;padding:0;}
html,body{min-height:100%;background:var(--bg);color:var(--text);font-family:'Space Grotesk',sans-serif;-webkit-font-smoothing:antialiased;transition:background .2s,color .2s;}
::-webkit-scrollbar{width:0;height:0;}
button,input,select,textarea{font-family:'Space Grotesk',sans-serif;}
input[type=date]{color-scheme:light dark;}
[data-theme="dark"] input[type=date]{color-scheme:dark;}

/* ── LAYOUT ── */
#app{min-height:100vh;padding-bottom:80px;}

/* ── HEADER ── */
.header{
  background:var(--s1);border-bottom:1px solid var(--border);
  padding:14px 16px;position:sticky;top:0;z-index:50;
  box-shadow:var(--shadow);
}
.header-row{display:flex;justify-content:space-between;align-items:center;max-width:520px;margin:0 auto;}
.back-btn{
  display:flex;align-items:center;gap:6px;
  background:var(--s2);border:1px solid var(--border);color:var(--text2);
  border-radius:8px;padding:7px 11px;font-size:12px;font-weight:700;
  text-decoration:none;transition:background .15s;
}
.back-btn:active{transform:scale(.97);}
.header-center{text-align:center;}
.header-title{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-.3px;}
.header-sub{font-size:10px;color:var(--text3);margin-top:1px;font-family:'Space Mono',monospace;}
.header-right{display:flex;gap:6px;align-items:center;}
.icon-btn{
  background:var(--s2);border:1px solid var(--border);color:var(--text3);
  border-radius:8px;padding:7px 10px;font-size:13px;font-weight:700;
  transition:background .15s;
}

/* ── SEARCH ── */
.search-wrap{padding:10px 16px 6px;max-width:520px;margin:0 auto;}
.search-inner{position:relative;}
.search-ico{position:absolute;left:12px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--text3);pointer-events:none;}
.search-input{
  width:100%;padding:10px 36px 10px 36px;
  border-radius:10px;background:var(--input-bg);border:1px solid var(--border2);
  color:var(--text);font-size:14px;font-weight:600;outline:none;
  transition:border-color .15s;
}
.search-input:focus{border-color:var(--text2);}
.search-clear{position:absolute;right:11px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text3);font-size:18px;padding:4px;display:none;}

/* ── FILTER TABS ── */
.filter-tabs{
  display:flex;background:var(--s1);border-bottom:1px solid var(--border);
  overflow-x:auto;padding:0 12px;scrollbar-width:none;
  max-width:520px;margin:0 auto;
}
.ftab{
  white-space:nowrap;padding:10px 12px;font-size:11px;font-weight:700;
  background:none;border:none;border-bottom:2px solid transparent;
  color:var(--text3);display:flex;align-items:center;gap:5px;transition:color .12s;
}
.ftab.on{color:var(--text);border-bottom-color:var(--amber);}
.ftab-badge{font-size:9px;font-weight:800;padding:1px 5px;border-radius:8px;background:var(--s2);color:var(--text3);}
.ftab.on .ftab-badge{background:var(--amberBg);color:var(--amberText);}

/* ── ORDER LIST ── */
.order-list{padding:10px 16px;max-width:520px;margin:0 auto;}

.order-card{
  background:var(--s1);border-radius:13px;border:1px solid var(--border);
  margin-bottom:9px;overflow:hidden;transition:border-color .15s;
  box-shadow:var(--shadow);
}
.order-card:active{transform:scale(.99);}
.order-top-stripe{height:3px;}
.order-body{padding:13px 14px;cursor:pointer;user-select:none;}
.order-row1{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;}
.order-num{font-family:'Space Mono',monospace;font-size:9px;font-weight:700;background:var(--s2);color:var(--text3);padding:2px 6px;border-radius:4px;margin-right:6px;}
.order-cust{font-size:15px;font-weight:800;color:var(--text);}
.order-row2{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:4px;}
.order-item-name{font-size:13px;font-weight:600;color:var(--text2);}
.order-row3{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:4px;}
.order-date{font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);}
.order-overdue{color:var(--red);font-weight:700;}
.chip-status{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:9px;font-weight:700;letter-spacing:.3px;}
.chip-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;display:inline-block;}
.order-amount{font-family:'Space Mono',monospace;font-size:14px;font-weight:700;color:var(--text);}

/* expanded detail */
.order-detail{border-top:1px solid var(--border);padding:12px 14px;}
.detail-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.detail-field{background:var(--s2);border-radius:7px;padding:8px 11px;flex:1;min-width:120px;}
.detail-label{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.7px;margin-bottom:3px;}
.detail-val{font-size:13px;font-weight:600;color:var(--text);}
.order-note{font-size:12px;color:var(--text2);background:var(--s2);border-radius:7px;padding:8px 11px;margin-bottom:10px;line-height:1.5;}
.order-actions{display:flex;gap:7px;flex-wrap:wrap;}
.act-btn{
  flex:1;min-width:80px;padding:8px 10px;border-radius:8px;
  font-size:11px;font-weight:700;border:1px solid;letter-spacing:.2px;
  transition:opacity .12s,transform .1s;
}
.act-btn:active{transform:scale(.97);}
.btn-ordered{background:var(--amberBg);color:var(--amberText);border-color:var(--amber);}
.btn-arrived{background:var(--blueBg);color:var(--blueText);border-color:var(--blue);}
.btn-delivered{background:var(--greenBg);color:var(--greenText);border-color:var(--green);}
.btn-cancel{background:var(--redBg);color:var(--redText);border-color:var(--red);}
.btn-edit{background:var(--s2);color:var(--text2);border-color:var(--border2);}
.btn-delete{background:var(--redBg);color:var(--redText);border-color:var(--red);}
.btn-reopen{background:var(--skyBg);color:var(--skyText);border-color:var(--sky);}

/* ── EMPTY ── */
.empty{text-align:center;padding:60px 20px;color:var(--text3);}
.empty-ico{font-size:38px;margin-bottom:10px;}
.empty-title{font-size:15px;font-weight:700;color:var(--text);margin-bottom:4px;}
.empty-sub{font-size:13px;}

/* ── MODAL / SHEET ── */
.overlay{
  position:fixed;inset:0;background:rgba(0,0,0,.5);
  backdrop-filter:blur(6px);
  display:flex;align-items:flex-end;justify-content:center;z-index:200;
}
.overlay.center{align-items:center;padding:20px;}
.sheet{
  background:var(--s1);border-radius:20px 20px 0 0;
  border:1px solid var(--border);border-bottom:none;
  width:100%;max-width:520px;max-height:94vh;overflow-y:auto;
}
.sheet-head{
  display:flex;justify-content:space-between;align-items:center;
  padding:18px 18px 13px;border-bottom:1px solid var(--border);
  position:sticky;top:0;background:var(--s1);z-index:5;
}
.sheet-title{font-size:17px;font-weight:800;color:var(--text);}
.close-btn{
  background:var(--s2);border:1px solid var(--border);color:var(--text2);
  width:28px;height:28px;border-radius:50%;font-size:14px;
  display:flex;align-items:center;justify-content:center;
}
.dialog{background:var(--s1);border-radius:16px;border:1px solid var(--border);padding:22px;width:100%;max-width:320px;}

/* ── FORM ── */
.form-body{padding:16px 18px 40px;}
.f-group{margin-bottom:14px;}
.f-label{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.9px;margin-bottom:5px;display:block;}
.f-label span{color:var(--red);margin-left:2px;}
.f-input{
  width:100%;padding:10px 13px;border-radius:9px;
  background:var(--input-bg);border:1px solid var(--border2);
  color:var(--text);font-size:14px;outline:none;
  transition:border-color .15s;
}
.f-input:focus{border-color:var(--text2);}
.f-input.err{border-color:var(--red);}
.f-err{color:var(--red);font-size:11px;margin-top:3px;}
.f-grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.f-textarea{resize:vertical;min-height:72px;}
/* category pills */
.cat-grid{display:flex;flex-wrap:wrap;gap:7px;}
.cat-pill{
  padding:7px 13px;border-radius:8px;
  background:transparent;border:1px solid var(--border2);
  color:var(--text3);font-size:12px;font-weight:700;
  transition:all .12s;
}
.cat-pill.on{background:var(--amberBg);color:var(--amberText);border-color:var(--amber);}
/* save btn */
.save-btn{
  width:100%;padding:13px;border-radius:10px;border:none;
  background:var(--amber);color:#000;
  font-size:14px;font-weight:800;letter-spacing:.3px;
  transition:opacity .12s;
}
[data-theme="dark"] .save-btn{background:var(--amber);color:#000;}
.save-btn:active{opacity:.85;}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:90px;left:50%;transform:translateX(-50%);
  background:var(--s1);border:1px solid var(--border2);
  border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;
  z-index:1000;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;
  box-shadow:var(--shadow);color:var(--text);
}
.toast.show{opacity:1;}

/* ── FAB ── */
.fab{
  position:fixed;bottom:22px;right:18px;
  width:52px;height:52px;border-radius:50%;
  background:var(--amber);border:none;color:#000;
  font-size:24px;font-weight:900;z-index:100;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px color-mix(in srgb,var(--amber) 40%,transparent);
}
.fab:active{transform:scale(.93);}

/* max width on wide screens */
@media(min-width:540px){.fab{right:calc(50% - 270px + 18px);}}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div class="header-row">
      <a href="index.html" class="back-btn">← Home</a>
      <div class="header-center">
        <div class="header-title">📦 Order Tracker</div>
        <div class="header-sub" id="hdr-sub">0 orders <span id="sync-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:#999;margin-left:4px;vertical-align:middle;" title="Connecting…"></span></div>
      </div>
      <div class="header-right">
        <button class="icon-btn" onclick="toggleTheme()" id="theme-btn" title="Toggle theme">☀️</button>
      </div>
    </div>
  </div>

  <div class="search-wrap">
    <div class="search-inner">
      <span class="search-ico">🔍</span>
      <input class="search-input" id="q" placeholder="Search customer, item, category…" oninput="onInput()" autocomplete="off"/>
      <button class="search-clear" id="qclr" onclick="clearSearch()">×</button>
    </div>
  </div>

  <div class="filter-tabs" id="ftabs"></div>
  <div class="order-list" id="order-list"></div>
</div>

<div class="toast" id="toast"></div>
<button class="fab" onclick="openAddOrder()">+</button>
<div id="modal-root"></div>

<script>
// ══ THEME ══════════════════════════════════════════════════
function applyTheme(t){
  document.documentElement.setAttribute('data-theme',t);
  localStorage.setItem('ira_theme',t);
  const b=document.getElementById('theme-btn');
  if(b) b.textContent=t==='dark'?'🌙':'☀️';
}
function toggleTheme(){
  applyTheme(document.documentElement.getAttribute('data-theme')==='light'?'dark':'light');
}
applyTheme(localStorage.getItem('ira_theme')||'light');

// ══ SUPABASE SYNC ══════════════════════════════════════════
const SB = {
  url:     'https://vjkxcpsjdxwqgdhxfjno.supabase.co',
  anonKey: 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqa3hjcHNqZHh3cWdkaHhmam5vIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3MzAwMjEsImV4cCI6MjA4OTMwNjAyMX0.yYpGwoXvSQdoorNJw2-mgBQ5W74cjA0E7PEURsAggTs',
  _h(extra){return{'Content-Type':'application/json','apikey':this.anonKey,'Authorization':'Bearer '+this.anonKey,'Prefer':'resolution=merge-duplicates',...extra};},
  _url(){return this.url+'/rest/v1/ira_orders';},
  async push(orders){
    const res=await fetch(this._url(),{method:'POST',headers:this._h(),body:JSON.stringify({id:'main',payload:{orders,updatedAt:new Date().toISOString()}})});
    return res.ok;
  },
  async pull(){
    const res=await fetch(this._url()+'?id=eq.main&select=payload,updated_at',{method:'GET',headers:this._h({Prefer:''})});
    if(!res.ok) return null;
    const rows=await res.json();
    if(!rows||!rows.length) return null;
    return {...rows[0].payload, _remoteTime: new Date(rows[0].updated_at).getTime()};
  },
  // Per-order merge: keep newest version of each order by updatedAt
  merge(local, remote){
    const lm=Object.fromEntries(local.map(o=>[o.id,o]));
    const rm=Object.fromEntries(remote.map(o=>[o.id,o]));
    const ids=new Set([...Object.keys(lm),...Object.keys(rm)]);
    const merged=[];
    ids.forEach(id=>{
      const l=lm[id], r=rm[id];
      if(!l){merged.push(r);return;}
      if(!r){merged.push(l);return;}
      const lt=l.updatedAt?new Date(l.updatedAt).getTime():0;
      const rt=r.updatedAt?new Date(r.updatedAt).getTime():0;
      // both missing timestamp → remote wins (server is truth)
      merged.push((lt===0&&rt===0)||rt>=lt ? r : l);
    });
    merged.sort((a,b)=>new Date(b.createdAt||0)-new Date(a.createdAt||0));
    return merged;
  },
};

let _lastSaved=parseInt(localStorage.getItem('ira_orders_ls')||'0')||0;
let _syncStatus='off'; // off | syncing | ok | error
let _pollTimer=null;

function saveSyncTs(){_lastSaved=Date.now();localStorage.setItem('ira_orders_ls',String(_lastSaved));}

async function syncNow(){
  _syncStatus='syncing'; updateSyncDot();
  try{
    const remote=await SB.pull();
    if(remote&&Array.isArray(remote.orders)){
      const merged=SB.merge(orders,remote.orders);
      if(JSON.stringify(merged)!==JSON.stringify(orders)){
        orders=merged;
        localStorage.setItem(DB_KEY,JSON.stringify(orders));
        renderAll();
      }
    }
    saveSyncTs();
    const ok=await SB.push(orders);
    _syncStatus=ok?'ok':'error';
  }catch(e){_syncStatus='error';}
  updateSyncDot();
  setTimeout(()=>{if(_syncStatus!=='syncing'){_syncStatus='ok';updateSyncDot();}},3000);
}

async function pullOnly(){
  try{
    const remote=await SB.pull();
    if(!remote||!Array.isArray(remote.orders)) return;
    const merged=SB.merge(orders,remote.orders);
    if(JSON.stringify(merged)===JSON.stringify(orders)) return;
    orders=merged;
    localStorage.setItem(DB_KEY,JSON.stringify(orders));
    _syncStatus='ok'; updateSyncDot();
    renderAll();
  }catch(e){}
}

function startPoller(){
  if(_pollTimer) clearInterval(_pollTimer);
  _pollTimer=setInterval(()=>{ if(!document.hidden) pullOnly(); },3000);
}
document.addEventListener('visibilitychange',()=>{
  if(!document.hidden){pullOnly();startPoller();}
});

function updateSyncDot(){
  const colors={off:'#999',syncing:'#FFB000',ok:'#009950',error:'#CC2200'};
  const labels={off:'Sync off',syncing:'Syncing…',ok:'Synced ✓',error:'Sync error'};
  const dot=document.getElementById('sync-dot');
  if(dot){dot.style.background=colors[_syncStatus];dot.title=labels[_syncStatus];}
  // Also update header sub
  const sub=document.getElementById('hdr-sub');
  if(sub){
    const total=orders.length;
    const pending=orders.filter(o=>o.status!=='Delivered'&&o.status!=='Cancelled').length;
    sub.innerHTML=`${total} total · ${pending} pending <span id="sync-dot" style="display:inline-block;width:6px;height:6px;border-radius:50%;background:${colors[_syncStatus]};margin-left:4px;vertical-align:middle;" title="${labels[_syncStatus]}"></span>`;
  }
}

// ══ DATA ═══════════════════════════════════════════════════
const DB_KEY='ira_orders';
let orders=JSON.parse(localStorage.getItem(DB_KEY)||'[]');
let filterTab='All';
let searchQ='';
let expanded=null;

function saveOrders(){
  localStorage.setItem(DB_KEY,JSON.stringify(orders));
  syncNow(); // push to Supabase after every local change
}

const genId=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
const padNo=n=>String(n).padStart(4,'0');
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
const fmtDate=iso=>{if(!iso)return'';const d=new Date(iso);return d.toLocaleDateString('en-IN',{day:'2-digit',month:'short',year:'numeric'});};
const today=()=>new Date().toISOString().slice(0,10);
const isOverdue=o=>{
  if(!o.expectedDate||o.status==='Delivered'||o.status==='Cancelled') return false;
  return new Date(o.expectedDate+'T23:59:59') < new Date();
};

// ══ STATUS CONFIG ══════════════════════════════════════════
const STATUS={
  'Ordered':  {dot:'#FFB000',bg:'amberBg', text:'amberText', label:'Ordered'},
  'Arrived':  {dot:'#0066CC',bg:'blueBg',  text:'blueText',  label:'Arrived'},
  'Delivered':{dot:'#009950',bg:'greenBg', text:'greenText', label:'Delivered'},
  'Cancelled':{dot:'#CC2200',bg:'redBg',   text:'redText',   label:'Cancelled'},
};
const STATUS_FLOW=['Ordered','Arrived','Delivered'];

const CATEGORIES=['Phone Case','Screen Guard','Charger','Cable','Earphone','Power Bank','Stand / Holder','Other'];

// ══ TOAST ══════════════════════════════════════════════════
let _tt;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2200);
}

// ══ CHIP HTML ══════════════════════════════════════════════
function chipHtml(status){
  const s=STATUS[status]||STATUS['Ordered'];
  return `<span class="chip-status" style="background:var(--${s.bg});color:var(--${s.text})"><span class="chip-dot" style="background:${s.dot}"></span>${status}</span>`;
}

// ══ HEADER ════════════════════════════════════════════════
function updateHeader(){ updateSyncDot(); }

// ══ FILTER TABS ═══════════════════════════════════════════
const TABS=['All','Ordered','Arrived','Delivered','Cancelled'];
function renderTabs(){
  document.getElementById('ftabs').innerHTML=TABS.map(t=>{
    const count=t==='All'?0:orders.filter(o=>o.status===t).length;
    const show=t!=='All'&&count>0;
    return `<button class="ftab${t===filterTab?' on':''}" onclick="setTab('${t}')">
      ${t}${show?`<span class="ftab-badge">${count}</span>`:''}
    </button>`;
  }).join('');
}
function setTab(t){filterTab=t;renderAll();}

// ══ SEARCH ════════════════════════════════════════════════
function onInput(){
  searchQ=document.getElementById('q').value;
  document.getElementById('qclr').style.display=searchQ?'block':'none';
  renderAll();
}
function clearSearch(){
  document.getElementById('q').value='';
  searchQ='';
  document.getElementById('qclr').style.display='none';
  renderAll();
}

// ══ RENDER LIST ═══════════════════════════════════════════
function renderAll(){
  updateHeader();
  renderTabs();

  let list=orders;
  // tab filter
  if(filterTab!=='All') list=list.filter(o=>o.status===filterTab);
  // search
  if(searchQ.trim()){
    const q=searchQ.toLowerCase();
    list=list.filter(o=>{
      return (o.customerName||'').toLowerCase().includes(q)||
             (o.itemName||'').toLowerCase().includes(q)||
             (o.category||'').toLowerCase().includes(q)||
             (o.notes||'').toLowerCase().includes(q)||
             (o.orderNo||'').includes(q);
    });
  }
  // sort: pending first, then by date desc
  list=[...list].sort((a,b)=>{
    const pa=a.status==='Delivered'||a.status==='Cancelled'?1:0;
    const pb=b.status==='Delivered'||b.status==='Cancelled'?1:0;
    if(pa!==pb) return pa-pb;
    return new Date(b.createdAt||0)-new Date(a.createdAt||0);
  });

  const el=document.getElementById('order-list');
  if(!list.length){
    el.innerHTML=`<div class="empty"><div class="empty-ico">📦</div>
      <div class="empty-title">${searchQ||filterTab!=='All'?'No results':'No orders yet'}</div>
      <div class="empty-sub">${searchQ||filterTab!=='All'?'Try a different filter':'Tap + to add a customer order'}</div>
    </div>`;
    return;
  }

  el.innerHTML=list.map(o=>renderOrderCard(o)).join('');
}

function renderOrderCard(o){
  const isExp=expanded===o.id;
  const s=STATUS[o.status]||STATUS['Ordered'];
  const overdue=isOverdue(o);
  const isClosed=o.status==='Delivered'||o.status==='Cancelled';

  const stripeColor=s.dot;
  const nextStatus=STATUS_FLOW[STATUS_FLOW.indexOf(o.status)+1];

  // action buttons based on status
  let actionBtns='';
  if(o.status==='Ordered'){
    actionBtns=`
      <button class="act-btn btn-arrived" onclick="setStatus('${o.id}','Arrived')">📥 Mark Arrived</button>
      <button class="act-btn btn-cancel" onclick="confirmCancel('${o.id}')">✕ Cancel</button>`;
  } else if(o.status==='Arrived'){
    actionBtns=`
      <button class="act-btn btn-delivered" onclick="setStatus('${o.id}','Delivered')">✓ Delivered</button>
      <button class="act-btn btn-cancel" onclick="confirmCancel('${o.id}')">✕ Cancel</button>`;
  } else if(o.status==='Delivered'){
    actionBtns=`<button class="act-btn btn-edit" onclick="openEdit('${o.id}')">✏️ Edit</button>`;
  } else if(o.status==='Cancelled'){
    actionBtns=`<button class="act-btn btn-reopen" onclick="setStatus('${o.id}','Ordered')">↺ Reopen</button>`;
  }

  return `<div class="order-card" style="opacity:${isClosed?.6:1}" id="oc_${o.id}">
    <div class="order-top-stripe" style="background:${stripeColor}"></div>
    <div class="order-body" onclick="toggleExpand('${o.id}')">
      <div class="order-row1">
        <div style="display:flex;align-items:center;flex:1;min-width:0;gap:6px;flex-wrap:wrap;">
          <span class="order-num">#${esc(o.orderNo)}</span>
          <span class="order-cust">${esc(o.customerName)}</span>
          ${overdue?`<span style="font-size:9px;font-weight:700;background:var(--redBg);color:var(--redText);padding:2px 7px;border-radius:8px;">⚠ Overdue</span>`:''}
        </div>
        <div style="text-align:right;flex-shrink:0;margin-left:8px;">
          ${o.amount?`<div class="order-amount">₹${(+o.amount).toLocaleString()}</div>`:''}
          <div style="font-size:11px;color:var(--text3);margin-top:4px">${isExp?'▲':'▼'}</div>
        </div>
      </div>
      <div class="order-row2">
        ${o.category?`<span style="font-size:10px;font-weight:700;background:var(--amberBg);color:var(--amberText);padding:2px 7px;border-radius:6px;">${esc(o.category)}</span>`:''}
        <span class="order-item-name">${esc(o.itemName)}</span>
      </div>
      <div class="order-row3">
        ${chipHtml(o.status)}
        ${o.mobile?`<span style="font-family:'Space Mono',monospace;font-size:10px;color:var(--text3);">${esc(o.mobile)}</span>`:''}
        ${o.expectedDate?`<span class="order-date${overdue?' order-overdue':''}">📅 ${fmtDate(o.expectedDate+'T12:00:00')}</span>`:''}
        <span style="font-size:10px;color:var(--text3);">Added ${fmtDate(o.createdAt)}</span>
      </div>
    </div>
    ${isExp?`<div class="order-detail">
      ${o.notes?`<div class="order-note">📝 ${esc(o.notes)}</div>`:''}
      <div class="detail-row">
        ${o.orderDate?`<div class="detail-field"><div class="detail-label">Order Date</div><div class="detail-val">${fmtDate(o.orderDate+'T12:00:00')}</div></div>`:''}
        ${o.expectedDate?`<div class="detail-field"><div class="detail-label">Expected By</div><div class="detail-val${overdue?' order-overdue':''}">${fmtDate(o.expectedDate+'T12:00:00')}</div></div>`:''}
        ${o.amount?`<div class="detail-field"><div class="detail-label">Amount</div><div class="detail-val">₹${(+o.amount).toLocaleString()}</div></div>`:''}
        ${o.advance?`<div class="detail-field"><div class="detail-label">Advance</div><div class="detail-val">₹${(+o.advance).toLocaleString()}</div></div>`:''}
      </div>
      <div class="order-actions">
        ${actionBtns}
        <button class="act-btn btn-edit" onclick="openEdit('${o.id}')">✏️ Edit</button>
        <button class="act-btn btn-delete" onclick="confirmDelete('${o.id}')">🗑</button>
      </div>
    </div>`:''}
  </div>`;
}

function toggleExpand(id){
  expanded=expanded===id?null:id;
  renderAll();
}

// ══ STATUS ACTIONS ════════════════════════════════════════
function setStatus(id,status){
  orders=orders.map(o=>o.id!==id?o:{...o,status,updatedAt:new Date().toISOString()});
  saveOrders();renderAll();
  toast(`✓ Marked as ${status}`);
}

// ══ ADD / EDIT FORM ═══════════════════════════════════════
let _editId=null;
let _formErrs={};

function openAddOrder(){
  _editId=null; _formErrs={};
  renderFormModal({customerName:'',mobile:'',itemName:'',category:'Phone Case',amount:'',advance:'',orderDate:today(),expectedDate:'',notes:''});
}
function openEdit(id){
  _editId=id; _formErrs={};
  const o=orders.find(x=>x.id===id);
  if(!o)return;
  renderFormModal({...o,orderDate:o.orderDate||today()});
}

function renderFormModal(f){
  const title=_editId?'Edit Order':'New Order';
  document.getElementById('modal-root').innerHTML=`
    <div class="overlay" onclick="if(event.target===this)closeModal()">
      <div class="sheet">
        <div class="sheet-head">
          <div class="sheet-title">${title}</div>
          <button class="close-btn" onclick="closeModal()">✕</button>
        </div>
        <div class="form-body">

          <div class="f-group">
            <label class="f-label">Customer Name <span>*</span></label>
            <input class="f-input${_formErrs.name?' err':''}" id="f_name" value="${esc(f.customerName)}" placeholder="e.g. Ravi Kumar" autocomplete="off"/>
            ${_formErrs.name?`<div class="f-err">⚠ Required</div>`:''}
          </div>

          <div class="f-group">
            <label class="f-label">Mobile <span style="color:var(--text3);font-weight:400;text-transform:none;font-size:9px">(optional)</span></label>
            <input class="f-input" id="f_mob" type="tel" value="${esc(f.mobile||'')}" placeholder="9876543210" autocomplete="off"/>
          </div>

          <div class="f-group">
            <label class="f-label">Category</label>
            <div class="cat-grid" id="cat-grid">
              ${CATEGORIES.map(c=>`<button type="button" class="cat-pill${(f.category||'Phone Case')===c?' on':''}" onclick="selectCat('${c}')">${c}</button>`).join('')}
            </div>
          </div>

          <div class="f-group">
            <label class="f-label">Item Description <span>*</span></label>
            <input class="f-input${_formErrs.item?' err':''}" id="f_item" value="${esc(f.itemName||'')}" placeholder="e.g. iPhone 15 Pro Magsafe Case – Black" autocomplete="off"/>
            ${_formErrs.item?`<div class="f-err">⚠ Required</div>`:''}
          </div>

          <div class="f-grid2">
            <div class="f-group">
              <label class="f-label">Amount (₹)</label>
              <input class="f-input" id="f_amt" type="number" value="${esc(f.amount||'')}" placeholder="0"/>
            </div>
            <div class="f-group">
              <label class="f-label">Advance (₹)</label>
              <input class="f-input" id="f_adv" type="number" value="${esc(f.advance||'')}" placeholder="0"/>
            </div>
          </div>

          <div class="f-grid2">
            <div class="f-group">
              <label class="f-label">Order Date</label>
              <input class="f-input" id="f_odate" type="date" value="${esc(f.orderDate||today())}"/>
            </div>
            <div class="f-group">
              <label class="f-label">Expected By</label>
              <input class="f-input" id="f_edate" type="date" value="${esc(f.expectedDate||'')}"/>
            </div>
          </div>

          <div class="f-group">
            <label class="f-label">Notes <span style="color:var(--text3);font-weight:400;text-transform:none;font-size:9px">(optional)</span></label>
            <textarea class="f-input f-textarea" id="f_notes" placeholder="Colour, variant, special requests…">${esc(f.notes||'')}</textarea>
          </div>

          <button class="save-btn" onclick="submitForm()">Save Order</button>
        </div>
      </div>
    </div>`;
  // store current category
  window._formCat = f.category || 'Phone Case';
}

function selectCat(c){
  window._formCat=c;
  document.querySelectorAll('.cat-pill').forEach(p=>{
    p.classList.toggle('on',p.textContent===c);
  });
}

function submitForm(){
  const name=document.getElementById('f_name').value.trim();
  const item=document.getElementById('f_item').value.trim();
  const errs={};
  if(!name) errs.name=true;
  if(!item) errs.item=true;
  if(Object.keys(errs).length){
    _formErrs=errs;
    // re-render form with errors
    const f={
      customerName:name,
      mobile:document.getElementById('f_mob').value,
      category:window._formCat||'Phone Case',
      itemName:item,
      amount:document.getElementById('f_amt').value,
      advance:document.getElementById('f_adv').value,
      orderDate:document.getElementById('f_odate').value,
      expectedDate:document.getElementById('f_edate').value,
      notes:document.getElementById('f_notes').value,
    };
    renderFormModal(f);
    return;
  }
  const data={
    customerName:name,
    mobile:document.getElementById('f_mob').value.trim(),
    category:window._formCat||'Phone Case',
    itemName:item,
    amount:document.getElementById('f_amt').value||'',
    advance:document.getElementById('f_adv').value||'',
    orderDate:document.getElementById('f_odate').value,
    expectedDate:document.getElementById('f_edate').value,
    notes:document.getElementById('f_notes').value.trim(),
  };
  if(_editId){
    orders=orders.map(o=>o.id!==_editId?o:{...o,...data,updatedAt:new Date().toISOString()});
    toast('✓ Order updated');
  } else {
    const ctr=orders.length+1;
    orders=[{id:genId(),orderNo:padNo(ctr),status:'Ordered',createdAt:new Date().toISOString(),updatedAt:new Date().toISOString(),...data},...orders];
    toast('✓ Order added');
  }
  saveOrders();
  closeModal();
  renderAll();
}

// ══ CONFIRM ═══════════════════════════════════════════════
let _confirmCb=null;
function confirmCancel(id){
  const o=orders.find(x=>x.id===id);
  _confirmCb=()=>setStatus(id,'Cancelled');
  showConfirm('Cancel order?',`Cancel order for "${o?.customerName}"?`,'Cancel Order');
}
function confirmDelete(id){
  const o=orders.find(x=>x.id===id);
  _confirmCb=()=>{
    orders=orders.filter(x=>x.id!==id);
    saveOrders();expanded=null;renderAll();
    toast('🗑 Order deleted');closeModal();
  };
  showConfirm('Delete order?',`#${o?.orderNo} "${o?.customerName}" will be permanently deleted.`,'Delete');
}
function showConfirm(title,msg,label){
  document.getElementById('modal-root').innerHTML=`
    <div class="overlay center" style="z-index:600">
      <div class="dialog">
        <div style="font-size:16px;font-weight:800;color:var(--red);margin-bottom:8px;">${esc(title)}</div>
        <div style="font-size:13px;color:var(--text2);margin-bottom:22px;line-height:1.6;">${esc(msg)}</div>
        <div style="display:flex;gap:8px;">
          <button onclick="closeModal()" style="flex:1;padding:10px;border-radius:8px;background:transparent;border:1px solid var(--border2);color:var(--text);font-size:13px;font-weight:700;">Cancel</button>
          <button onclick="runConfirm()" style="flex:1;padding:10px;border-radius:8px;background:var(--redBg);border:1px solid var(--red);color:var(--redText);font-size:13px;font-weight:700;">${esc(label)}</button>
        </div>
      </div>
    </div>`;
}
function runConfirm(){if(_confirmCb){_confirmCb();_confirmCb=null;}}
function closeModal(){document.getElementById('modal-root').innerHTML='';}

// ══ BOOT ══════════════════════════════════════════════════
renderAll();
// Pull from Supabase on load, then start background poller
setTimeout(async()=>{
  await pullOnly();
  startPoller();
},800);
</script>
</body>
